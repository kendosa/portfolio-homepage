<script>
(function () {
  const svg  = document.getElementById('btLogo');
  const turb = document.getElementById('turb');
  const disp = document.getElementById('disp');

  const DURATION = 9000; // ms for one full cycle

  // Easing helpers
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function smoothstep(t, a, b) {
    const x = clamp((t - a) / (b - a), 0, 1);
    return x * x * (3 - 2 * x);
  }

  // Phase envelope — 0..1 ramp up/down
  function dispEnvelope(t) {
    // Ramps up 0.12→0.38, holds 0.38→0.62, ramps down 0.62→0.88
    const up   = smoothstep(t, 0.12, 0.38);
    const down = smoothstep(t, 0.62, 0.88);
    return up - down;
  }

  function rotationDeg(t) {
    // Still 0→0.12, accelerates through middle, eases out at end back to 0
    if (t < 0.12) return 0;
    if (t > 0.88) return 0;
    const inner = (t - 0.12) / (0.88 - 0.12); // 0→1
    // ease-in-out
    const ease = inner < 0.5
      ? 2 * inner * inner
      : 1 - Math.pow(-2 * inner + 2, 2) / 2;
    return ease * 360;
  }

  const start = performance.now();

  function tick(now) {
    const t = ((now - start) % DURATION) / DURATION;

    // Displacement scale peaks at ~65px in the organic/orbital phase
    const scale = dispEnvelope(t) * 65;
    disp.setAttribute('scale', scale.toFixed(2));

    // Turbulence frequency drifts up slightly during distorted phase
    const freq = 0.018 + dispEnvelope(t) * 0.022;
    turb.setAttribute('baseFrequency', freq.toFixed(4));

    // Rotation through the full cycle
    const deg = rotationDeg(t);
    svg.style.transform = `rotate(${deg.toFixed(2)}deg)`;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}());
</script>
