<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="https://use.typekit.net/eux7kam.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 414px; height: 629px;
  overflow: hidden;
  background: #fff;
  cursor: default;
  font-family: neue-haas-grotesk-display, 'Helvetica Neue', Helvetica, sans-serif;
}

.heading {
  position: absolute;
  left: 29px; top: 50px;
  font-size: 30px;
  font-weight: 300;
  letter-spacing: -0.025em;
  color: #0a1f44;
  line-height: 1;
}

/* Card group mirrors Principle layout:
   group top-left at (46, 163), 325×354 */
#deck {
  position: absolute;
  left: 46px; top: 163px;
  width: 325px; height: 354px;
}

.card {
  position: absolute;
  width: 305px; height: 334px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 20px rgba(10,31,68,0.10), 0 1px 4px rgba(10,31,68,0.06);
  padding: 20px 20px 18px;
  display: flex;
  flex-direction: column;
}

.card-company {
  font-size: 19px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: #0a1f44;
  line-height: 1.15;
  margin-bottom: 4px;
}

.card-label {
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: #0a1f44;
  opacity: 0.45;
  margin-bottom: 16px;
}

.card-body {
  font-size: 12.5px;
  font-weight: 400;
  line-height: 1.58;
  color: #0a1f44;
  flex: 1;
}

.card-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  color: #2456C0;
  margin-top: 14px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="heading">Case Studies</div>

<div id="deck">
  <!-- Cards populated by JS so content + order are controlled in one place -->
</div>

<script>
(function () {

  var DATA = [
    {
      company: 'HireVue',
      body: 'Businesses frequently struggle to find ways to expand their hiring pipeline, find more diverse candidates, and reduce unconscious bias in hiring decisions. HireVue’s core business model helps solve these challenges.',
      tag: 'Diverse Teams'
    },
    {
      company: 'PPD',
      body: 'PPD is a Carlyle portfolio company profiled for its innovative work accelerating patient enrollment and the use of digital and virtual trials to increase patient access, retention and engagement in vital medical research.',
      tag: 'Diverse Teams'
    },
    {
      company: 'Accelerate Learning',
      body: 'The persistent causes of the achievement gap in the United States include costly, static, and scarce educational materials. ALI’s mission is to develop digital learning tools that produce verifiably better outcomes at a lower price point.',
      tag: 'Stronger Communities'
    },
    {
      company: 'Cardinal Renewables',
      body: 'Electricity generation accounts for approximately 28% of U.S. emissions alone — almost two-thirds of our electricity comes from burning fossil fuels, creating a large and growing investment opportunity in renewable capacity.',
      tag: 'Climate Resilience'
    },
    {
      company: 'Accolade Wines',
      body: 'Accolade is acutely aware of the impact climate change can have on their crops. In 2020 they achieved a 44% reduction in CO₂e by integrating on-site wind turbines and clean energy sourcing at their bottling facility.',
      tag: 'Climate Resilience'
    }
  ];

  /* Stack positions: [0] = back, [2] = front */
  var POS = [
    { left:  0, top:  0, z: 1 },
    { left: 10, top: 10, z: 2 },
    { left: 20, top: 20, z: 3 }
  ];

  var PAUSE    = 2400; /* ms each card stays visible */
  var FLY_DUR  = 380;  /* ms dismissal flight */
  var SHIFT_DUR = 320; /* ms cards shift positions */

  var deck  = document.getElementById('deck');
  var cards = [];
  var alive = []; /* indices in deck order: [0]=back … [n-1]=front */

  /* Build card elements */
  DATA.forEach(function (d) {
    var el = document.createElement('div');
    el.className = 'card';
    el.innerHTML =
      '<div class="card-company">' + d.company + '</div>' +
      '<div class="card-label">Case Study</div>' +
      '<div class="card-body">' + d.body + '</div>' +
      '<div class="card-tag">' + d.tag + '</div>';
    el.style.display = 'none';
    deck.appendChild(el);
    cards.push(el);
    alive.push(cards.length - 1);
  });

  function layout(animated) {
    var n = alive.length;
    alive.forEach(function (idx, si) {
      var card      = cards[idx];
      var fromFront = n - 1 - si; /* 0 = front card */

      card.style.display = 'block';

      if (fromFront >= POS.length) {
        /* Hidden behind the visible stack */
        card.style.transition    = 'none';
        card.style.left          = POS[0].left + 'px';
        card.style.top           = POS[0].top  + 'px';
        card.style.zIndex        = '0';
        card.style.opacity       = '0';
        card.style.pointerEvents = 'none';
        return;
      }

      var p = POS[POS.length - 1 - fromFront]; /* POS[2]=front … POS[0]=back */
      card.style.transition    = animated
        ? 'left ' + SHIFT_DUR + 'ms ease, top ' + SHIFT_DUR + 'ms ease, opacity ' + SHIFT_DUR + 'ms ease'
        : 'none';
      card.style.left          = p.left + 'px';
      card.style.top           = p.top  + 'px';
      card.style.zIndex        = String(p.z);
      card.style.opacity       = '1';
      card.style.pointerEvents = 'none';
    });
  }

  function dismissFront(done) {
    if (alive.length === 0) { done(); return; }

    var front = cards[alive[alive.length - 1]];

    /* Fly card up and off-screen with slight rotation */
    front.style.transition    = 'transform ' + FLY_DUR + 'ms cubic-bezier(0.4,0,0.6,1), opacity ' + (FLY_DUR - 60) + 'ms ease';
    front.style.transform     = 'translateY(-560px) rotate(-7deg)';
    front.style.opacity       = '0';
    front.style.pointerEvents = 'none';

    alive.pop();

    setTimeout(function () {
      front.style.display   = 'none';
      front.style.transform = '';
      layout(true);   /* shift remaining cards forward */
      done();
    }, FLY_DUR + 20);
  }

  function runLoop() {
    if (alive.length === 0) {
      /* Brief pause then reset */
      setTimeout(reset, 700);
      return;
    }

    /* Wait, then dismiss the front card, then recurse */
    setTimeout(function () {
      dismissFront(runLoop);
    }, PAUSE);
  }

  function reset() {
    /* Restore all cards silently at their stacked positions */
    cards.forEach(function (c, i) {
      c.style.transition = 'none';
      c.style.transform  = '';
      c.style.opacity    = '0';
      c.style.display    = 'block';
    });
    alive = cards.map(function (_, i) { return i; });

    /* Force reflow so transitions fire properly */
    deck.offsetHeight; // eslint-disable-line no-unused-expressions

    /* Fade visible cards in */
    cards.forEach(function (c, i) {
      var fromFront = alive.length - 1 - i;
      if (fromFront < POS.length) {
        var p = POS[POS.length - 1 - fromFront];
        c.style.transition = 'none';
        c.style.left       = p.left + 'px';
        c.style.top        = p.top  + 'px';
        c.style.zIndex     = String(p.z);
        deck.offsetHeight; // reflow
        c.style.transition = 'opacity 0.5s ease';
        c.style.opacity    = '1';
      } else {
        c.style.left    = POS[0].left + 'px';
        c.style.top     = POS[0].top  + 'px';
        c.style.zIndex  = '0';
        c.style.opacity = '0';
        c.style.display = 'none';
      }
    });

    setTimeout(runLoop, 500 + PAUSE);
  }

  /* Initial render + start */
  layout(false);
  setTimeout(runLoop, PAUSE);

}());
</script>
</body>
</html>
