<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info Kenny Phillips</title>
  <link rel="stylesheet" href="https://use.typekit.net/eux7kam.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .info-layout {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: var(--pad);
      padding: calc(clamp(3rem, 8vw, 6rem) + 10px) var(--pad) 60px;
    }
    .info-layout .hero {
      flex: 1;
      padding: 0;
      min-height: 0;
      max-width: none;
    }
    .info-layout .hero-text {
      max-width: 22em;
      text-wrap: pretty;
    }
    @media (max-width: 900px) {
      .info-layout {
        flex-direction: column;
        padding: calc(clamp(3rem, 8vw, 6rem) + 10px) var(--pad) clamp(4rem, 8vw, 7rem);
      }
    }

    .info-cta {
      padding: 0 var(--pad) clamp(13rem, 24vw, 22rem);
    }
    .info-cta p {
      font-family: neue-haas-grotesk-display, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-weight: 400;
      line-height: 1.45;
      color: #292828;
      text-wrap: balance;
      max-width: 26em;
    }
    .info-cta a {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    body {
      background-image:
        radial-gradient(circle 130px at var(--mx, -50%) var(--my, -50%), rgba(245, 244, 242, 0.82) 0%, transparent 100%),
        radial-gradient(ellipse 72% 52% at var(--g1x, 8%) var(--g1y, 2%), var(--blob1) 0%, transparent 70%),
        radial-gradient(ellipse 68% 50% at var(--g2x, 93%) var(--g2y, 3%), var(--blob2) 0%, transparent 65%);
      background-attachment: fixed;
    }
    @media (max-width: 700px) {
      body { background-attachment: scroll; }
    }
    .site-header { background: transparent; }
  </style>
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="logo">Kenny Phillips</a>
    <nav class="nav-links">
      <a href="index.html">Work</a>
      <a href="info.html" class="nav-active">Info</a>
      <a href="personal.html">Personal</a>
    </nav>
    <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
  </header>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-link">Work</a>
      <a href="info.html" class="mobile-link nav-active">Info</a>
      <a href="personal.html" class="mobile-link">Personal</a>
    </nav>
  </div>

  <!-- INFO + PORTRAIT -->
  <div class="info-layout">
    <section class="hero">
      <p class="hero-text">
        Kenny is a designer based in<br>the Hudson Valley, currently<br>integrating AI into his workflow<br>and raising his first kid
      </p>
    </section>

  </div>

  <!-- INFO CTA -->
  <div class="info-cta">
    <p>In NYC and want to chat? <a href="mailto:kennydphillips@gmail.com?Subject=Hey%20Kenny!">Drop me a line</a>, coffee or beer is on&nbsp;me</p>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <a href="index.html" class="footer-logo">Kenny Phillips</a>
    <span class="footer-copy">© 2026 Kenny Phillips</span>
    <a href="Kenny-Phillips-Resume-2026.pdf" target="_blank" rel="noopener" class="footer-resume">Resume</a>
    <div class="footer-social">
      <a href="mailto:kennydphillips@gmail.com?Subject=Hey%20Kenny!">Send an email</a>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    (function () {
      let scrollY = 0, targetScrollY = 0;
      let mx = 0.5, my = 0.5, tmx = 0.5, tmy = 0.5;
      let cx = -50, cy = -50, tcx = -50, tcy = -50;
      const body = document.body;
      function lerp(a, b, t) { return a + (b - a) * t; }

      function tick() {
        scrollY = lerp(scrollY, targetScrollY, 0.07);
        mx = lerp(mx, tmx, 0.04);
        my = lerp(my, tmy, 0.04);
        cx = lerp(cx, tcx, 0.18);
        cy = lerp(cy, tcy, 0.18);

        const p = scrollY / Math.max(1, document.documentElement.scrollHeight - window.innerHeight);

        body.style.setProperty('--g1x', (8  + mx * 4 + p * 8 ).toFixed(2) + '%');
        body.style.setProperty('--g1y', (2  + my * 3 + p * 20).toFixed(2) + '%');
        body.style.setProperty('--g2x', (93 - mx * 4 - p * 8 ).toFixed(2) + '%');
        body.style.setProperty('--g2y', (3  + my * 2 + p * 18).toFixed(2) + '%');
        body.style.setProperty('--mx',  cx.toFixed(2) + '%');
        body.style.setProperty('--my',  cy.toFixed(2) + '%');

        requestAnimationFrame(tick);
      }

      window.addEventListener('scroll',    () => { targetScrollY = window.scrollY; }, { passive: true });
      document.addEventListener('mousemove', e => {
        tmx = e.clientX / window.innerWidth;
        tmy = e.clientY / window.innerHeight;
        tcx = e.clientX / window.innerWidth  * 100;
        tcy = e.clientY / window.innerHeight * 100;
      });
      document.addEventListener('mouseleave', () => { tcx = -50; tcy = -50; });

      tick();
    }());
  </script>
</body>
</html>
