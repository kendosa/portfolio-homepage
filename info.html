<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info — Kenny Phillips</title>
  <link rel="stylesheet" href="https://use.typekit.net/eux7kam.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
    }

    #cursor-img {
      position: fixed;
      width: 272px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 1000;
      transform: translate(16px, 16px);
    }
    #cursor-img.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="logo">Kenny Phillips</a>
    <nav class="nav-links">
      <a href="index.html">Work</a>
      <a href="info.html" class="nav-active">Info</a>
      <a href="woodwork.html">Woodwork</a>
    </nav>
    <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
  </header>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-link">Work</a>
      <a href="info.html" class="mobile-link nav-active">Info</a>
      <a href="woodwork.html" class="mobile-link">Woodwork</a>
    </nav>
  </div>

  <!-- INFO -->
  <section class="hero" style="max-width: 66vw;">
    <p class="hero-text">
      Kenny Phillips is a designer based in <em style="white-space: nowrap;">New York</em>, specialising in <span class="hover-reveal">brand identity</span>, visual systems, and art direction.
    </p>
  </section>

  <!-- Cursor image -->
  <img id="cursor-img" src="images/wing-ming.jpg" alt="" />

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-copy">© 2026 Kenny Phillips</span>
    <div class="footer-social">
      <a href="mailto:kennydphillips@gmail.com?Subject=Hey%20Kenny!">Email</a>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const trigger = document.querySelector('.hover-reveal');
    const img = document.getElementById('cursor-img');

    const brandImages = [
      'images/wing-ming.jpg',
      'images/endeavor-health.jpg',
      'images/Studio-Glagola.jpg',
      'images/Kohls.jpg',
      'images/superbrewed-food.jpg'
    ];

    let currentIndex = 0;
    let isHovered = false;
    let lastX = null;
    let accumulated = 0;
    const THRESHOLD = 2; // px of horizontal travel to flip image

    function showImage(index) {
      img.classList.remove('visible');
      setTimeout(() => {
        img.src = brandImages[index];
        if (isHovered) img.classList.add('visible');
      }, 150);
    }

    trigger.addEventListener('mouseenter', e => {
      isHovered = true;
      lastX = e.clientX;
      accumulated = 0;
      currentIndex = 0;
      img.src = brandImages[currentIndex];
      img.classList.add('visible');
    });

    trigger.addEventListener('mousemove', e => {
      if (lastX === null) { lastX = e.clientX; return; }
      const delta = e.clientX - lastX;
      lastX = e.clientX;
      accumulated += delta;

      if (accumulated > THRESHOLD) {
        accumulated = 0;
        currentIndex = (currentIndex + 1) % brandImages.length;
        showImage(currentIndex);
      } else if (accumulated < -THRESHOLD) {
        accumulated = 0;
        currentIndex = (currentIndex - 1 + brandImages.length) % brandImages.length;
        showImage(currentIndex);
      }
    });

    trigger.addEventListener('mouseleave', () => {
      isHovered = false;
      img.classList.remove('visible');
      lastX = null;
      accumulated = 0;
    });

    document.addEventListener('mousemove', e => {
      img.style.left = e.clientX + 'px';
      img.style.top  = e.clientY + 'px';
    });
  </script>
</body>
</html>
