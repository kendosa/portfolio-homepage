<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info — Kenny Phillips</title>
  <link rel="stylesheet" href="https://use.typekit.net/eux7kam.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
    }
    .hover-reveal {
      cursor: default;
    }
    #cursor-img {
      position: fixed;
      width: 272px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 1000;
      transform: translate(16px, 16px);
    }
    #cursor-img.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="logo">Kenny Phillips</a>
    <nav class="nav-links">
      <a href="index.html#work">Work</a>
      <a href="info.html" class="nav-active">Info</a>
      <a href="woodwork.html">Woodwork</a>
    </nav>
    <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
  </header>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
      <a href="index.html#work" class="mobile-link">Work</a>
      <a href="info.html" class="mobile-link nav-active">Info</a>
      <a href="woodwork.html" class="mobile-link">Woodwork</a>
    </nav>
  </div>

  <!-- INFO -->
  <section class="hero" style="max-width: 66vw;">
    <p class="hero-text">
      Kenny Phillips is a designer based in <em style="white-space: nowrap;">New York</em>, specialising in <span class="hover-reveal">brand identity</span>, visual systems, and art direction.
    </p>
  </section>

  <!-- Cursor image -->
  <img id="cursor-img" src="images/wing-ming.jpg" alt="" />

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-copy">© 2026 Kenny Phillips</span>
    <div class="footer-social">
      <a href="mailto:kennydphillips@gmail.com?Subject=Hey%20Kenny!">Email</a>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const trigger = document.querySelector('.hover-reveal');
    const img = document.getElementById('cursor-img');

    trigger.addEventListener('mouseenter', () => img.classList.add('visible'));
    trigger.addEventListener('mouseleave', () => img.classList.remove('visible'));

    document.addEventListener('mousemove', e => {
      img.style.left = e.clientX + 'px';
      img.style.top  = e.clientY + 'px';
    });
  </script>
</body>
</html>
