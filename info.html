<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info — Kenny Phillips</title>
  <link rel="stylesheet" href="https://use.typekit.net/eux7kam.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.0/lib/p5.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
    }

    #cursor-img {
      position: fixed;
      width: 272px;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 1000;
      transform: translate(16px, 16px);
    }
    #cursor-img.visible {
      opacity: 1;
    }

    .portrait-section {
      padding: 0 var(--pad) clamp(4rem, 8vw, 7rem);
    }
    #portrait-sketch {
      width: min(520px, 100%);
    }
    #portrait-sketch canvas {
      display: block;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="logo">Kenny Phillips</a>
    <nav class="nav-links">
      <a href="index.html">Work</a>
      <a href="info.html" class="nav-active">Info</a>
      <a href="woodwork.html">Personal</a>
    </nav>
    <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
  </header>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-link">Work</a>
      <a href="info.html" class="mobile-link nav-active">Info</a>
      <a href="woodwork.html" class="mobile-link">Personal</a>
    </nav>
  </div>

  <!-- INFO -->
  <section class="hero" style="max-width: 66vw;">
    <p class="hero-text">
      Kenny Phillips is a designer based in <em style="white-space: nowrap;">New York</em>, specializing in <span class="hover-reveal">brand identity</span>, visual systems, and art direction.
    </p>
  </section>

  <!-- PORTRAIT SKETCH -->
  <section class="portrait-section">
    <div id="portrait-sketch"></div>
  </section>

  <!-- Cursor image -->
  <img id="cursor-img" src="images/wing-ming.jpg" alt="" />
  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-copy">© 2026 Kenny Phillips</span>
    <div class="footer-social">
      <a href="mailto:kennydphillips@gmail.com?Subject=Hey%20Kenny!">Email</a>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    document.fonts.ready.then(function () {
      const el = document.getElementById('portrait-sketch');

      new p5(function (p) {
        let particles = [];
        const word = 'KENNY PHILLIPS ';
        let wIdx = 0;
        let portrait;
        let sz, sc, maxD;
        const spd = 0.05;

        p.preload = function () {
          portrait = p.loadImage('images/kenny-portrait.png');
        };

        p.setup = function () {
          sz = Math.min(el.getBoundingClientRect().width, 520);
          sc = sz / 520;
          maxD = 190 * sc;

          portrait.resize(sz, 0); // width to sz, height auto (preserves aspect ratio)
          portrait.loadPixels();

          p.createCanvas(sz, portrait.height);
          p.textAlign(p.CENTER, p.CENTER);
          p.textFont('neue-haas-grotesk-display');
          p.noStroke();

          const step = 9;
          for (let y = 0; y < p.height; y += step) {
            for (let x = 0; x < p.width; x += step) {
              const i = (x + y * p.width) * 4;
              const bright = (portrait.pixels[i] + portrait.pixels[i + 1] + portrait.pixels[i + 2]) / 3;
              if (bright < 128) {
                particles.push({
                  x, y,
                  ox: x, oy: y,
                  tx: x, ty: y,
                  ch: word[wIdx++ % word.length]
                });
              }
            }
          }
        };

        p.draw = function () {
          p.background(245, 244, 242);
          for (const pt of particles) {
            const d = p.dist(pt.ox, pt.oy, p.mouseX, p.mouseY);
            pt.tx = p.map(d, 0, maxD, p.mouseX, pt.ox, true);
            pt.ty = p.map(d, 0, maxD, p.mouseY, pt.oy, true);
            pt.x += (pt.tx - pt.x) * spd;
            pt.y += (pt.ty - pt.y) * spd;
            p.textSize(p.map(d, 0, maxD, 1.5 * sc, 9 * sc, true));
            p.fill(41, 40, 40);
            p.text(pt.ch, pt.x, pt.y);
          }
        };
      }, el);
    });
  </script>
  <script>
    const trigger = document.querySelector('.hover-reveal');
    const img = document.getElementById('cursor-img');

    const brandImages = [
      'images/wing-ming.jpg',
      'images/endeavor-health.jpg',
      'images/Studio-Glagola.jpg',
      'images/Kohls.jpg',
      'images/superbrewed-food.jpg'
    ];

    let currentIndex = 0;
    let isHovered = false;
    let lastX = null;
    let accumulated = 0;
    const THRESHOLD = 2; // px of horizontal travel to flip image

    function showImage(index) {
      img.classList.remove('visible');
      setTimeout(() => {
        img.src = brandImages[index];
        if (isHovered) img.classList.add('visible');
      }, 150);
    }

    trigger.addEventListener('mouseenter', e => {
      isHovered = true;
      lastX = e.clientX;
      accumulated = 0;
      currentIndex = 0;
      img.src = brandImages[currentIndex];
      img.classList.add('visible');
    });

    trigger.addEventListener('mousemove', e => {
      if (lastX === null) { lastX = e.clientX; return; }
      const delta = e.clientX - lastX;
      lastX = e.clientX;
      accumulated += delta;

      if (accumulated > THRESHOLD) {
        accumulated = 0;
        currentIndex = (currentIndex + 1) % brandImages.length;
        showImage(currentIndex);
      } else if (accumulated < -THRESHOLD) {
        accumulated = 0;
        currentIndex = (currentIndex - 1 + brandImages.length) % brandImages.length;
        showImage(currentIndex);
      }
    });

    trigger.addEventListener('mouseleave', () => {
      isHovered = false;
      img.classList.remove('visible');
      lastX = null;
      accumulated = 0;
    });

    document.addEventListener('mousemove', e => {
      img.style.left = e.clientX + 'px';
      img.style.top  = e.clientY + 'px';
    });
  </script>
</body>
</html>
