  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .info-layout {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: clamp(2rem, 5vw, 5rem);
      padding: calc(clamp(3rem, 8vw, 6rem) + 10px) var(--pad) 60px;
    }
    .info-layout .hero {
      flex: 1;
      padding: 0;
      min-height: 0;
      max-width: none;
    }
    .info-layout .hero-text {
      max-width: 18em;
    }
    .portrait-section {
      flex-shrink: 0;
    }
    #portrait-sketch {
      height: calc(100vh - var(--header-h) - clamp(3rem, 8vw, 6rem) - 144px);
      width: calc((100vh - var(--header-h) - clamp(3rem, 8vw, 6rem) - 144px) * 520 / 518);
    }
    #portrait-sketch canvas {
      display: block;
    }

    @media (max-width: 900px) {
      .info-layout {
        flex-direction: column;
        padding: calc(clamp(3rem, 8vw, 6rem) + 10px) var(--pad) clamp(4rem, 8vw, 7rem);
      }
      #portrait-sketch {
        height: auto;
        width: min(520px, 100%);
        max-width: 100%;
      }
    }

    body {
      background-image:
        radial-gradient(circle 130px at var(--mx, -50%) var(--my, -50%), rgba(245, 244, 242, 0.82) 0%, transparent 100%),
        radial-gradient(ellipse 72% 52% at var(--g1x, 8%) var(--g1y, 2%), var(--blob1) 0%, transparent 70%),
        radial-gradient(ellipse 68% 50% at var(--g2x, 93%) var(--g2y, 3%), var(--blob2) 0%, transparent 65%);
      background-attachment: fixed;
    }
    @media (max-width: 700px) {
      body { background-attachment: scroll; }
    }
    .site-header { background: transparent; }
    .site-footer  { background: transparent; }
  </style>

        p.setup = function () {

          sc = sz / SRC_W;

            particles.push({ x: ox, y: oy, ox, oy, tx: ox, ty: oy, ch: word[i % word.length] });
          });
        };

        p.draw = function () {
          p.clear();
          const bd = document.body;
          const col = bd.classList.contains('forest') ? [244, 242, 229]
                    : bd.classList.contains('aa')     ? [252, 252, 252]
                    : bd.classList.contains('green')  ? [34, 31, 32]
                    : [41, 40, 40];
          for (const pt of particles) {
            const d = p.dist(pt.ox, pt.oy, p.mouseX, p.mouseY);
            pt.tx = p.map(d, 0, maxD, p.mouseX, pt.ox, true);
            pt.ty = p.map(d, 0, maxD, p.mouseY, pt.oy, true);
            pt.x += (pt.tx - pt.x) * spd;
            pt.y += (pt.ty - pt.y) * spd;
            p.textSize(p.map(d, 0, maxD, 1.5 * sc, 9 * sc, true));
            p.fill(col[0], col[1], col[2]);
            p.text(pt.ch, pt.x, pt.y);
          }
        };

  <script>
    (function () {
      let scrollY = 0, targetScrollY = 0;
      let mx = 0.5, my = 0.5, tmx = 0.5, tmy = 0.5;
      let cx = -50, cy = -50, tcx = -50, tcy = -50;
      const body = document.body;
      function lerp(a, b, t) { return a + (b - a) * t; }

      function tick() {
        scrollY = lerp(scrollY, targetScrollY, 0.07);
        mx = lerp(mx, tmx, 0.04);
        my = lerp(my, tmy, 0.04);
        cx = lerp(cx, tcx, 0.18);
        cy = lerp(cy, tcy, 0.18);

        const p = scrollY / Math.max(1, document.documentElement.scrollHeight - window.innerHeight);

        body.style.setProperty('--g1x', (8  + mx * 4 + p * 8 ).toFixed(2) + '%');
        body.style.setProperty('--g1y', (2  + my * 3 + p * 20).toFixed(2) + '%');
        body.style.setProperty('--g2x', (93 - mx * 4 - p * 8 ).toFixed(2) + '%');
        body.style.setProperty('--g2y', (3  + my * 2 + p * 18).toFixed(2) + '%');
        body.style.setProperty('--mx',  cx.toFixed(2) + '%');
        body.style.setProperty('--my',  cy.toFixed(2) + '%');

        requestAnimationFrame(tick);
      }

      window.addEventListener('scroll',    () => { targetScrollY = window.scrollY; }, { passive: true });
      document.addEventListener('mousemove', e => {
        tmx = e.clientX / window.innerWidth;
        tmy = e.clientY / window.innerHeight;
        tcx = e.clientX / window.innerWidth  * 100;
        tcy = e.clientY / window.innerHeight * 100;
      });
      document.addEventListener('mouseleave', () => { tcx = -50; tcy = -50; });

      tick();
    }());
  </script>
