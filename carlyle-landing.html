<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
*  { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#001427; overflow-x:hidden; }

/* image stack */
.lp-wrap {
  position: relative;
  width: 100%;
  /* aspect ratio 1440:3243 keeps scroll height correct at any embed width */
  padding-bottom: calc(3243 / 1440 * 100%);
}

.lp-img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: top left;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  display: block;
}
.lp-img.active { opacity: 1; }

/* hotspots */
.lp-spot {
  position: absolute;
  cursor: pointer;
  /* outline: 1px solid red; */ /* uncomment to debug placement */
}
</style>
</head>
<body>
<div class="lp-wrap" id="lpWrap">

  <!-- State images (all same dimensions, stacked) -->
  <img class="lp-img active" id="s-default"     src="images/cir-landing-default.jpg"     alt="" />
  <img class="lp-img"        id="s-hamburger"   src="images/cir-landing-hamburger.jpg"   alt="" />
  <img class="lp-img"        id="s-diverse"     src="images/cir-landing-diverse.jpg"     alt="" />
  <img class="lp-img"        id="s-engaged"     src="images/cir-landing-engaged.jpg"     alt="" />
  <img class="lp-img"        id="s-sustainable" src="images/cir-landing-sustainable.jpg" alt="" />
  <img class="lp-img"        id="s-climate"     src="images/cir-landing-climate.jpg"     alt="" />
  <img class="lp-img"        id="s-communities" src="images/cir-landing-communities.jpg" alt="" />

  <!-- Hamburger icon (top-right nav) -->
  <div class="lp-spot" id="btn-hamburger"
       style="left:91%; top:0.4%; width:7.5%; height:2%;"></div>

  <!-- X close button (same position, only active during hamburger state) -->
  <div class="lp-spot" id="btn-close"
       style="left:91%; top:0.3%; width:7.5%; height:2%; display:none;"></div>

  <!-- Card 1 — Diverse Teams -->
  <div class="lp-spot card-spot" data-state="diverse"
       style="left:2.5%; top:30.5%; width:18%; height:11%;"></div>

  <!-- Card 2 — Engaged Employees -->
  <div class="lp-spot card-spot" data-state="engaged"
       style="left:21%; top:30.5%; width:18%; height:11%;"></div>

  <!-- Card 3 — Sustainable Growth -->
  <div class="lp-spot card-spot" data-state="sustainable"
       style="left:39.5%; top:30.5%; width:18%; height:11%;"></div>

  <!-- Card 4 — Climate Resilience -->
  <div class="lp-spot card-spot" data-state="climate"
       style="left:58%; top:30.5%; width:18%; height:11%;"></div>

  <!-- Card 5 — Stronger Communities -->
  <div class="lp-spot card-spot" data-state="communities"
       style="left:76.5%; top:30.5%; width:18%; height:11%;"></div>

</div>

<script>
(function () {
  var hamburgerOpen = false;

  function show(id) {
    document.querySelectorAll('.lp-img').forEach(function (img) {
      img.classList.remove('active');
    });
    document.getElementById('s-' + id).classList.add('active');
  }

  // hamburger open
  document.getElementById('btn-hamburger').addEventListener('click', function () {
    hamburgerOpen = true;
    show('hamburger');
    document.getElementById('btn-hamburger').style.display = 'none';
    document.getElementById('btn-close').style.display = 'block';
    document.querySelectorAll('.card-spot').forEach(function (s) { s.style.pointerEvents = 'none'; });
  });

  // X close
  document.getElementById('btn-close').addEventListener('click', function () {
    hamburgerOpen = false;
    show('default');
    document.getElementById('btn-hamburger').style.display = 'block';
    document.getElementById('btn-close').style.display = 'none';
    document.querySelectorAll('.card-spot').forEach(function (s) { s.style.pointerEvents = ''; });
  });

  // card hovers
  document.querySelectorAll('.card-spot').forEach(function (card) {
    card.addEventListener('mouseenter', function () {
      if (!hamburgerOpen) show(this.dataset.state);
    });
    card.addEventListener('mouseleave', function () {
      if (!hamburgerOpen) show('default');
    });
  });
}());
</script>
</body>
</html>
