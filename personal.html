  <style>
    body { margin: 0; }

    /* ── Section ── */
    .cc-section {
      /* height set in JS: 100vh + track travel distance */
      height: 300vh;
    }

    .cc-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-x: clip;
      overflow-y: visible;
      display: flex;
      align-items: center;
    }

    /* While dragging, and until the next scroll after a drop, let the
       gallery render above the fixed header (z-index: 100) too, so a
       dropped card can cover the logo/nav text as well as the footer. */
    body.cc-drag-elevated .cc-sticky {
      z-index: 101;
    }

    /* ── Scrolling track ── */
    .cc-track {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1.5vw, 20px);
      padding: 0 clamp(32px, 5vw, 80px);
      will-change: transform;
    }

    /* ── Image cards ── */
    .cc-card {
      flex-shrink: 0;
      will-change: transform;
      border-radius: 3px;
      overflow: hidden;
    }
    .cc-card--portrait,
    .cc-card--landscape,
    .cc-card--tall {
      height: clamp(280px, 62vh, 660px);
    }

    /* placeholder fill */
    .cc-card-fill {
      height: 100%;
      width: auto;
      display: block;
    }

    /* ── Text cards (first + last track items) ── */
    .cc-card--text {
      overflow: visible;
      border-radius: 0;
      padding: 0 clamp(48px, 8vw, 120px);
      display: flex;
      align-items: center;
    }
    .cc-card--text span {
      display: block;
      font-size: 3rem;
      font-weight: 400;
      line-height: 3.5rem;
      letter-spacing: 0em;
      color: #292828;
      white-space: nowrap;
    }

    /* ── Custom cursor label ── */
    /* Suppress the site-wide dot only while over an image card */
    body.cc-on-card #cursor-dot { opacity: 0 !important; transition: none !important; }
    body.sc-active #cursor-dot { opacity: 0 !important; transition: none !important; }
    .cc-card[data-label],
    .cc-card[data-label] * { cursor: none !important; }
    .cc-sticky { cursor: none !important; }

    #scrollCursor {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      width: 120px;
      height: 120px;
      opacity: 0;
      transition: opacity 0.15s ease;
      transform: translate(-50%, -50%);
    }
    .scroll-cursor-bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--black);
    }
    .scroll-cursor-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    @keyframes scroll-arrow-bounce {
      0%, 100% {
        transform: translateY(0);
        animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1);
      }
      50% {
        transform: translateY(20px);
        animation-timing-function: cubic-bezier(0.55, 0.055, 0.675, 0.19);
      }
    }
    .scroll-arrow {
      animation: scroll-arrow-bounce 0.72s infinite;
    }
    @media (pointer: coarse) {
      #scrollCursor {
        top: calc(50% - 130px) !important;
        left: 50% !important;
        transform: translateX(-50%);
        width: 90px !important;
        height: 90px !important;
      }
    }
    /* Grabbing state during drag */
    body.cc-dragging,
    body.cc-dragging * { cursor: grabbing !important; }
    body.cc-dragging #ccCursor { opacity: 0 !important; }
    body.cc-dragging #cursor-dot { opacity: 0 !important; transition: none !important; }
    #ccCursor {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      font-family: neue-haas-grotesk-display, 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 3rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      color: #ffffff;
      mix-blend-mode: difference;
      opacity: 0;
      transition: opacity 0.12s ease;
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }
    @media (pointer: coarse) {
      #ccCursor { display: none !important; }
    }

    @media (max-width: 767px) {
      .cc-card--portrait,
      .cc-card--tall {
        height: clamp(200px, 50vh, 500px);
      }
      .cc-card--landscape {
        height: clamp(120px, 30vh, 240px);
      }
    }
  </style>

  <script src="main.js"></script>
  <script>
  (function () {
    const section = document.getElementById('ccSection');
    const track   = document.getElementById('ccTrack');
    const cards   = Array.from(track.querySelectorAll('.cc-card'));
    if (!section || !track || !cards.length) return;

    function sign() { return Math.random() < 0.5 ? 1 : -1; }

    // Text cards (first + last) get no motion — only image cards animate
    const cardData = cards.map(function (card) {
      const isText = card.classList.contains('cc-card--text');
      return {
        el:     card,
        isText: isText,
        xPct:   isText ? 0 : (Math.random() * 20 + 30) * sign(),
        yPct:   isText ? 0 : (Math.random() * 10 + 20) * sign(),
        rot:    isText ? 0 : (Math.random() * 10 + 10) * sign(),
        left:   0,
        width:  0,
        dragX:  0,
        dragY:  0,
        baseZ:  0
      };
    });

    // Set z-index — earlier cards sit on top by default; data-z overrides for specific pairs
    cardData.forEach(function (d, i) {
      d.baseZ = d.el.dataset.z !== undefined ? parseInt(d.el.dataset.z) : cardData.length - i;
      d.el.style.zIndex = d.baseZ;
    });

    function measure() {
      track.style.transform = 'translateX(0px)';
      cardData.forEach(function (d) {
        d.left  = d.el.offsetLeft;
        d.width = d.el.offsetWidth;
      });
    }

    function setHeight() {
      track.style.transform = 'translateX(0px)';
      const travel = track.scrollWidth - window.innerWidth;
      section.style.height = (window.innerHeight + Math.max(travel, 0)) + 'px';
      measure();
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    let cur = 0, tgt = 0, firstFrame = true;

    function onScroll() {
      const top     = section.getBoundingClientRect().top;
      const scrollH = section.offsetHeight - window.innerHeight;
      tgt = clamp(-top / scrollH, 0, 1);
    }

    function tick() {
      if (firstFrame) { cur = tgt; firstFrame = false; }
      cur += (tgt - cur) * 0.08;

      const travel = track.scrollWidth - window.innerWidth;
      const trackX = travel * cur;

      track.style.transform = 'translateX(' + (-trackX).toFixed(2) + 'px)';

      const vw = window.innerWidth;

      cardData.forEach(function (d) {
        if (d.isText) return;

        const viewLeft = d.left - trackX;
        var t = 1 - 2 * (viewLeft + d.width) / (vw + d.width);
        t = clamp(t, -1.3, 1.3);

        // Drag offset applied first so it moves in screen space regardless of card rotation
        d.el.style.transform =
          'translate(' + d.dragX.toFixed(2) + 'px,' + d.dragY.toFixed(2) + 'px) ' +
          'translateX(' + (t * d.xPct).toFixed(2) + '%) ' +
          'translateY(' + (t * d.yPct).toFixed(2) + '%) ' +
          'rotate('     + (t * d.rot).toFixed(2)  + 'deg)';
      });

      requestAnimationFrame(tick);
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', function () { setHeight(); onScroll(); }, { passive: true });

    // Start immediately — script is at bottom of body so DOM is ready
    setHeight();
    onScroll();

    // If the page loads at the top, nudge cur forward so a card peeks
    // from the right edge, hinting at the horizontal scroll experience
    if (tgt === 0) {
      const travel = track.scrollWidth - window.innerWidth;
      if (travel > 0) {
        cur = 120 / travel;
        firstFrame = false;
      }
    }

    requestAnimationFrame(tick);

    // Re-measure once images are fully loaded in case any dimensions shifted
    window.addEventListener('load', function () { setHeight(); onScroll(); });

    // ── Drag-to-snap ────────────────────────────────────────────────────────
    var dragCard = null, dragStartMouseX = 0, dragStartMouseY = 0;
    var dragStartDragX = 0, dragStartDragY = 0;
    var dragTopZ = 9000;

    cardData.forEach(function (d) {
      if (d.isText) return;
      d.isDragging = false;

      d.el.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        e.preventDefault();
        dragCard = d;
        d.isDragging = true;
        dragStartMouseX = e.clientX;
        dragStartMouseY = e.clientY;
        dragStartDragX  = d.dragX;
        dragStartDragY  = d.dragY;
        d.el.style.zIndex = ++dragTopZ;
        document.body.classList.add('cc-dragging');
        document.body.classList.add('cc-drag-elevated');
      });
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragCard) return;
      dragCard.dragX = dragStartDragX + (e.clientX - dragStartMouseX);
      dragCard.dragY = dragStartDragY + (e.clientY - dragStartMouseY);
    });

    document.addEventListener('mouseup', function () {
      if (!dragCard) return;
      dragCard.isDragging = false;
      document.body.classList.remove('cc-dragging');
      // leave both the card's z-index and the gallery's elevation above
      // the header in place — dropped card stays on top until the user
      // scrolls, at which point it naturally scrolls away underneath.
      dragCard = null;
    });

    window.addEventListener('scroll', function () {
      document.body.classList.remove('cc-drag-elevated');
    }, { passive: true });
  }());

  // ── Suppress link navigation after drag ──────────────────────────────────
  (function () {
    document.querySelectorAll('a.cc-card').forEach(function (link) {
      var startX = 0, startY = 0;
      link.addEventListener('mousedown', function (e) {
        startX = e.clientX;
        startY = e.clientY;
      });
      link.addEventListener('click', function (e) {
        if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
          e.preventDefault();
        }
      });
    });
  }());

  // ── Custom image card cursor ──────────────────────────────────────────────
  (function () {
    var cur = document.getElementById('ccCursor');
    if (!cur) return;

    document.addEventListener('mousemove', function (e) {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });

    document.querySelectorAll('.cc-card[data-label]').forEach(function (card) {
      card.addEventListener('mouseenter', function () {
        cur.textContent = card.dataset.label;
        cur.style.opacity = '1';
        document.body.classList.add('cc-on-card');
      });
      card.addEventListener('mouseleave', function () {
        cur.style.opacity = '0';
        document.body.classList.remove('cc-on-card');
      });
    });
  }());

  // ── Scroll cursor (fades + drifts down as user scrolls) ──
  (function () {
    var sc      = document.getElementById('scrollCursor');
    var section = document.getElementById('ccSection');
    if (!sc) return;

    var overImage   = false;
    var hasScrolled = false;
    var isTouch     = window.matchMedia('(pointer: coarse)').matches;

    // Mobile: fade starts at scrollY=0 and completes when text card clears the cursor.
    // trackX ≈ scrollY, so the fade endpoint = text card right edge − cursor left edge.
    var mobileFadeDist = (function () {
      if (!isTouch || !section) return 250;
      var textCard = section.querySelector('.cc-card--text');
      if (!textCard) return 250;
      // offsetLeft + offsetWidth gives the right edge in layout space (no translation applied)
      var textRight  = textCard.offsetLeft + textCard.offsetWidth;
      var cursorLeft = window.innerWidth * 0.5 - 45; // half cursor width (90px / 2)
      return Math.max(120, Math.round(textRight - cursorLeft));
    }());

    function showCursor() {
      if (overImage || hasScrolled) return;
      sc.style.opacity = '1';
      sc.style.transform = '';
      document.body.classList.add('sc-active');
    }
    function hideCursor() {
      sc.style.opacity = '0';
      document.body.classList.remove('sc-active');
    }

    document.addEventListener('mousemove', function (e) {
      sc.style.left = e.clientX + 'px';
      sc.style.top  = e.clientY + 'px';
      if (!overImage && !hasScrolled) showCursor();
    });
    document.addEventListener('mouseleave', hideCursor);

    document.querySelectorAll('.cc-card[data-label]').forEach(function (card) {
      card.addEventListener('mouseenter', function () {
        overImage = true;
        hideCursor();
      });
      card.addEventListener('mouseleave', function () {
        overImage = false;
        if (!hasScrolled) showCursor();
      });
    });

    window.addEventListener('scroll', function () {
      var sTop    = section ? section.getBoundingClientRect().top : 1;
      var scrollY = window.pageYOffset;

      if (isTouch) {
        // Mobile: fade from first pixel of scroll, driven by scrollY
        if (scrollY === 0) {
          hasScrolled = false;
          sc.style.opacity   = '';
          sc.style.transform = 'translateX(-50%)';
          if (!overImage) showCursor();
          return;
        }
        hasScrolled = true;
        document.body.classList.remove('sc-active');
        var fp    = Math.min(scrollY / mobileFadeDist, 1);
        var drift = (fp * 28).toFixed(1);
        sc.style.opacity   = Math.max(0, 1 - fp).toFixed(3);
        sc.style.transform = 'translateX(-50%) translateY(' + drift + 'px)';
        return;
      }

      // Desktop: fade tied to ccSection scroll progress
      if (sTop >= 0) {
        hasScrolled = false;
        sc.style.transform = '';
        showCursor();
        return;
      }

      hasScrolled = true;
      document.body.classList.remove('sc-active');

      var scrolled     = -sTop;
      var fadeProgress = Math.min(scrolled / 220, 1);
      var opacity      = Math.max(0, 1 - fadeProgress);
      var drift        = (fadeProgress * 28).toFixed(1);

      sc.style.opacity   = opacity.toFixed(3);
      sc.style.transform = 'translate(-50%, -50%) translateY(' + drift + 'px)';
    }, { passive: true });

    if (isTouch) showCursor();
  }());
  </script>
